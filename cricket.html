<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hand Cricket 🏏</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #1a7c3e;
    --lime: #a8e63d;
    --dark: #0d1f12;
    --card: #132a1a;
    --text: #e8f5e9;
    --muted: #7aab83;
    --accent: #ffcf40;
    --red: #e84545;
    --radius: 16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(26,124,62,0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(168,230,61,0.10) 0%, transparent 50%);
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 7vw, 3.6rem);
    letter-spacing: 3px;
    color: var(--lime);
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 0 32px rgba(168,230,61,0.35);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  /* Scoreboard */
  .scoreboard {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 20px;
  }
  .score-card {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(168,230,61,0.15);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .score-card.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--lime);
    border-radius: 2px;
  }
  .score-card .label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .score-card .runs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--lime);
  }
  .score-card .wickets {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .score-card .target-tag {
    font-size: 0.72rem;
    color: var(--accent);
    margin-top: 2px;
  }
  /* Pitch display */
  .pitch {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border: 1px solid rgba(168,230,61,0.12);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .hands-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-bottom: 16px;
  }
  .hand-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .hand-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .hand-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    line-height: 1;
    color: var(--text);
    transition: transform 0.2s, color 0.2s;
  }
  .hand-num.out { color: var(--red); }
  .hand-num.scored { color: var(--lime); }
  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .message-box {
    background: rgba(168,230,61,0.06);
    border: 1px solid rgba(168,230,61,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: background 0.3s;
  }
  .message-box.out-msg { background: rgba(232,69,69,0.12); border-color: rgba(232,69,69,0.25); color: var(--red); }
  .message-box.win-msg { background: rgba(168,230,61,0.14); border-color: rgba(168,230,61,0.35); color: var(--lime); }
  /* Phase badge */
  .phase-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    background: rgba(255,207,64,0.15);
    color: var(--accent);
    border: 1px solid rgba(255,207,64,0.3);
  }
  /* Buttons */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 16px;
  }
  .num-btn {
    background: var(--card);
    border: 1.5px solid rgba(168,230,61,0.2);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 1px;
    padding: 18px 0;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .num-btn:hover:not(:disabled) {
    background: rgba(168,230,61,0.1);
    border-color: var(--lime);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(168,230,61,0.15);
  }
  .num-btn:active:not(:disabled) { transform: translateY(0); }
  .num-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .num-btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(168,230,61,0.25);
    transform: scale(0);
    animation: ripple 0.4s linear;
    pointer-events: none;
  }
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }
  /* Action row */
  .action-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 500px;
  }
  .restart-btn {
    flex: 1;
    background: transparent;
    border: 1.5px solid rgba(168,230,61,0.3);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .restart-btn:hover { background: rgba(168,230,61,0.07); color: var(--lime); border-color: var(--lime); }
  /* Stats bar */
  .stats-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    margin-top: 16px;
  }
  .stat-pill {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(168,230,61,0.1);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
  }
  .stat-pill .s-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--lime);
    line-height: 1;
  }
  .stat-pill .s-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  /* bounce anim */
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.25s ease; }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #1a2e20;
    border: 1.5px solid rgba(168,230,61,0.25);
    border-radius: 20px;
    padding: 32px 28px 24px;
    max-width: 340px;
    width: 90%;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-icon { font-size: 2.6rem; margin-bottom: 10px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 2px;
    color: var(--lime);
    margin-bottom: 8px;
  }
  .modal-msg {
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 22px;
  }
  .modal-btn {
    background: var(--lime);
    color: var(--dark);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 12px 36px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.5px;
  }
  .modal-btn:hover { opacity: 0.88; transform: translateY(-1px); }
</style>
</head>
<body>

<h1>Hand Cricket</h1>
<p class="subtitle">Pick a number · Outsmart the computer</p>

<div class="scoreboard">
  <div class="score-card" id="playerCard">
    <div class="label">You</div>
    <div class="runs" id="playerScore">0</div>
    <div class="wickets" id="playerWickets">0 wickets</div>
  </div>
  <div class="score-card" id="compCard">
    <div class="label">Computer</div>
    <div class="runs" id="compScore">0</div>
    <div class="wickets" id="compWickets">0 wickets</div>
    <div class="target-tag" id="targetTag"></div>
  </div>
</div>

<div class="pitch">
  <div id="phaseBadge" class="phase-badge">Your Innings – Batting</div>
  <div class="hands-row">
    <div class="hand-box">
      <div class="hand-label">You</div>
      <div class="hand-num" id="playerHand">–</div>
    </div>
    <div class="vs">VS</div>
    <div class="hand-box">
      <div class="hand-label">Computer</div>
      <div class="hand-num" id="compHand">–</div>
    </div>
  </div>
  <div class="message-box" id="msgBox">Choose a number to start batting!</div>
</div>

<div class="btn-grid" id="btnGrid">
  <button class="num-btn" onclick="play(1)">1</button>
  <button class="num-btn" onclick="play(2)">2</button>
  <button class="num-btn" onclick="play(3)">3</button>
  <button class="num-btn" onclick="play(4)">4</button>
  <button class="num-btn" onclick="play(5)">5</button>
  <button class="num-btn" onclick="play(6)">6</button>
</div>

<!-- Transition Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-icon" id="modalIcon">🏏</div>
    <div class="modal-title" id="modalTitle">Innings Over!</div>
    <div class="modal-msg" id="modalMsg">Your batting is over! Now you bowl.</div>
    <button class="modal-btn" id="modalBtn" onclick="closeModal()">OK, Let's Bowl!</button>
  </div>
</div>

<div class="action-row">
  <button class="restart-btn" onclick="restart()">🔄 Restart Game</button>
</div>

<div class="stats-row">
  <div class="stat-pill"><div class="s-val" id="statBalls">0</div><div class="s-label">Balls</div></div>
  <div class="stat-pill"><div class="s-val" id="statSR">0</div><div class="s-label">Strike Rate</div></div>
  <div class="stat-pill"><div class="s-val" id="statWins">0</div><div class="s-label">Wins</div></div>
  <div class="stat-pill"><div class="s-val" id="statLoss">0</div><div class="s-label">Losses</div></div>
</div>

<script>
/*
  PHASES:
    player_bat  — Player bats, computer bowls (computer picks number, player picks number; same = OUT)
    player_bowl — Player bowls, computer bats (player tries to match computer's number; same = OUT for computer)
    game_over
*/
const WICKETS_MAX = 3;
let state = {};
let sessionWins = 0, sessionLoss = 0;

function initState() {
  return {
    phase: 'player_bat',
    playerRuns: 0,
    compRuns: 0,
    playerWickets: 0,
    compWickets: 0,
    target: null,
    balls: 0,
    totalBalls: 0,
    done: false,
  };
}

function restart() {
  state = initState();
  render();
  setMsg('Choose a number to start batting! 🏏', '');
  enableButtons(true);
  resetHands();
}

function randNum() { return Math.floor(Math.random() * 6) + 1; }
function resetHands() {
  ['playerHand','compHand'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '–';
    el.className = 'hand-num';
  });
}

function play(n) {
  if (state.done) return;
  const comp = randNum();
  state.balls++;
  state.totalBalls++;

  const ph = document.getElementById('playerHand');
  const ch = document.getElementById('compHand');
  ph.textContent = n;
  ch.textContent = comp;
  ph.className = 'hand-num';
  ch.className = 'hand-num';

  if (state.phase === 'player_bat') {
    // Player bats: same number = OUT, different = player scores n runs
    if (n === comp) {
      state.playerWickets++;
      ph.className = 'hand-num out';
      ch.className = 'hand-num out';
      if (state.playerWickets >= WICKETS_MAX) {
        // Batting innings over → show modal → switch to bowling
        enableButtons(false);
        render();
        triggerPop(ph); triggerPop(ch);
        setTimeout(() => showModal(
          '🏏',
          'Innings Over!',
          `Your batting is over! You scored <strong>${state.playerRuns}</strong> runs.\nNow you bowl. Computer needs <strong>${state.playerRuns + 1}</strong> to win.`,
          "OK, Let's Bowl!"
        ), 600);
        return;
      } else {
        setMsg(`OUT! ${WICKETS_MAX - state.playerWickets} wicket(s) remaining.`, 'out-msg');
      }
    } else {
      state.playerRuns += n;
      ph.className = 'hand-num scored';
      setMsg(`+${n} runs! Your total: ${state.playerRuns} 🏏`, '');
    }

  } else if (state.phase === 'player_bowl') {
    // Player bowls: player picks a number trying to MATCH computer's number → comp OUT
    // Computer bats: scores comp's number if no match
    if (n === comp) {
      // Computer OUT
      state.compWickets++;
      ch.className = 'hand-num out';
      ph.className = 'hand-num scored'; // bowler celebration
      if (state.compWickets >= WICKETS_MAX || state.compRuns >= state.target) {
        endGame();
        return;
      } else {
        const needed = state.target - state.compRuns;
        setMsg(`Computer OUT! Needs ${needed} more. ${WICKETS_MAX - state.compWickets} wicket(s) left.`, 'out-msg');
      }
    } else {
      state.compRuns += comp;
      ch.className = 'hand-num scored';
      if (state.compRuns >= state.target) {
        endGame();
        return;
      }
      const needed = state.target - state.compRuns;
      setMsg(`Computer scored ${comp}. Needs ${needed} more to win.`, '');
    }
  }

  triggerPop(ph); triggerPop(ch);
  render();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  // Switch to bowling phase
  state.phase = 'player_bowl';
  state.target = state.playerRuns + 1;
  state.balls = 0;
  state.compWickets = 0;
  resetHands();
  render();
  setMsg(`You bowl now! Computer needs ${state.target} to win. Pick a number to bowl! 🎳`, '');
  enableButtons(true);
}

function showModal(icon, title, msg, btnText) {
  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').innerHTML = msg.replace(/\n/g,'<br>');
  document.getElementById('modalBtn').textContent = btnText;
  document.getElementById('modalOverlay').classList.add('show');
}

function endGame() {
  state.done = true;
  state.phase = 'game_over';
  enableButtons(false);
  render();

  const playerWon = state.compRuns < state.target && state.compWickets >= WICKETS_MAX
                    || state.compWickets >= WICKETS_MAX;
  const compWon   = state.compRuns >= state.target;

  if (compWon) {
    sessionLoss++;
    showModal('💻', 'Computer Wins!',
      `Computer chased down ${state.target} and won!\nComputer: ${state.compRuns} | You: ${state.playerRuns}`,
      'Play Again');
  } else {
    sessionWins++;
    showModal('🏆', 'You Win!',
      `You defended ${state.playerRuns}! Computer all out for ${state.compRuns}.\nGreat bowling! 🎳`,
      'Play Again');
  }

  // Override closeModal to restart instead
  document.getElementById('modalBtn').onclick = () => {
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('modalBtn').onclick = closeModal;
    restart();
  };
  updateSessionStats();
}

function render() {
  document.getElementById('playerScore').textContent = state.playerRuns;
  document.getElementById('compScore').textContent = state.compRuns;
  document.getElementById('playerWickets').textContent = `${state.playerWickets}/${WICKETS_MAX} wickets`;
  document.getElementById('compWickets').textContent = `${state.compWickets}/${WICKETS_MAX} wickets`;
  document.getElementById('targetTag').textContent = state.target ? `Target: ${state.target}` : '';

  const badge = document.getElementById('phaseBadge');
  const phaseMap = {
    player_bat: '🏏 Your Innings – Batting',
    player_bowl: '🎳 Your Innings – Bowling',
    game_over: '🏁 Game Over'
  };
  badge.textContent = phaseMap[state.phase] || '';

  document.getElementById('playerCard').classList.toggle('active', state.phase === 'player_bat');
  document.getElementById('compCard').classList.toggle('active', state.phase === 'player_bowl');

  document.getElementById('statBalls').textContent = state.balls;
  const sr = state.phase === 'player_bat' && state.balls > 0
    ? Math.round((state.playerRuns / state.balls) * 100) : 0;
  document.getElementById('statSR').textContent = sr;
  updateSessionStats();
}

function setMsg(text, cls) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'message-box' + (cls ? ' ' + cls : '');
}

function enableButtons(on) {
  document.querySelectorAll('.num-btn').forEach(b => b.disabled = !on);
}

function updateSessionStats() {
  document.getElementById('statWins').textContent = sessionWins;
  document.getElementById('statLoss').textContent = sessionLoss;
}

function triggerPop(el) {
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

// Ripple effect
document.querySelectorAll('.num-btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 450);
  });
});

restart();
</script>
</body>
</html>
